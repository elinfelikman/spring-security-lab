<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת הרשמה - אזור ניהול</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="signup-container">
    <h2>הרשמת משתמש חדש במערכת</h2>
    <input type="text" id="username" placeholder="שם משתמש חדש" required>
    <input type="password" id="password" placeholder="סיסמה חזקה" required>
    <button onclick="submitSignUp()">בצע רישום מאובטח</button>
    <div id="message"></div>
</div>

<script>
    async function submitSignUp() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        if(!username || !password) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "נא למלא את כל השדות";
            return;
        }

        try {
            // שליחת בקשת POST אמיתית מהדפדפן לשרת שלנו
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const text = await response.text();

            if (response.ok) {
                messageDiv.style.color = "green";
                messageDiv.innerText = "המשתמש נרשם בהצלחה עם סיסמה מוצפנת!";
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            } else {
                messageDiv.style.color = "red";
                messageDiv.innerText = text;
            }
        } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "שגיאת תקשורת עם השרת";
        }
    }
</script>
</body>
</html>
